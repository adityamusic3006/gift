<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Couple Gallery</title>
<style>
    body{font-family:sans-serif;background:#f7f7f7;text-align:center;margin:0;}
    header{padding:20px;background:#ff4d6d;color:white;}
    nav{margin:20px;}
    nav button{margin:5px;padding:10px 15px;border:none;border-radius:5px;background:#ff4d6d;color:white;cursor:pointer;}
    nav button:hover{background:#e60050;}
    .gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;padding-bottom:50px;}
    .gallery-item{width:200px;height:200px;overflow:hidden;border-radius:10px;cursor:pointer;position:relative;transition:transform 0.3s;}
    .gallery-item img{width:100%;height:100%;object-fit:cover;}
    .gallery-item:hover{transform:scale(1.1);}
    .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;flex-direction:column;z-index:1000;}
    .lightbox img{max-width:90%;max-height:70%;border-radius:10px;}
    .lightbox p{color:white;margin-top:10px;font-size:18px;}
    .lightbox span{position:absolute;top:20px;right:30px;font-size:40px;color:white;cursor:pointer;}
    @media(max-width:600px){.gallery-item{width:45%;height:150px;}}
</style>
</head>
<body>

<header><h1>Dynamic Couple Gallery</h1></header>
<nav id="filter-buttons"></nav>
<section class="gallery" id="gallery"></section>

<div class="lightbox" id="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="">
    <p id="lightbox-caption"></p>
</div>

<script>
let galleryData = [];

// Load JSON dynamically (simulating fetch)
fetch('gallery.json')
.then(res => res.json())
.then(data => {
    galleryData = data;
    createFilters();
    displayGallery('all');
});

// Create dynamic filter buttons
function createFilters(){
    const types = [...new Set(galleryData.map(item => item.type))];
    const nav = document.getElementById('filter-buttons');
    const allBtn = document.createElement('button');
    allBtn.innerText = 'All';
    allBtn.onclick = ()=>displayGallery('all');
    nav.appendChild(allBtn);
    types.forEach(type=>{
        const btn = document.createElement('button');
        btn.innerText = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = ()=>displayGallery(type);
        nav.appendChild(btn);
    });
}

// Display gallery items dynamically
function displayGallery(filter){
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    galleryData.forEach(item=>{
        if(filter==='all' || item.type===filter){
            const div = document.createElement('div');
            div.classList.add('gallery-item');
            div.onclick = ()=>openLightbox(item);
            const img = document.createElement('img');
            img.src = item.src;
            div.appendChild(img);
            gallery.appendChild(div);
        }
    });
}

// Lightbox functions
function openLightbox(item){
    document.getElementById('lightbox').style.display='flex';
    document.getElementById('lightbox-img').src = item.src;
    document.getElementById('lightbox-caption').innerText = item.caption;
}
function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }
</script>

</body>
</html>
